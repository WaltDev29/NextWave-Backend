name: CI - Run Integration Tests

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  test:
    name: Pytest Integration Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_password!
          MYSQL_DATABASE: nextwave_test
          MYSQL_USER: nextwave_user
          MYSQL_PASSWORD: user_password!
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -proot_password!"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: services/api/requirements.txt

      - name: 의존성 설치
        working-directory: services/api
        run: pip install -r requirements.txt

      - name: Pytest 실행
        working-directory: services/api
        env:
          # CI MySQL 서비스 컨테이너는 localhost:3306으로 접근
          TEST_DATABASE_URL: mysql+pymysql://nextwave_user:user_password!@127.0.0.1:3306/nextwave_test
          # 앱 실행에 필요한 환경 변수
          DATABASE_URL: mysql+pymysql://nextwave_user:user_password!@127.0.0.1:3306/nextwave_test
          SECRET_KEY: nextwave_super_secret_key_v1_production_2026!!
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
          PROJECT_NAME: NextWave
          API_V1_STR: /api/v1
        run: python -m pytest tests/ -v --tb=short
