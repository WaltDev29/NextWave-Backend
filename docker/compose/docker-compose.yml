version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: nextwave-db
    restart: always
    env_file:
      - ../env/.env.db
    volumes:
      - ../../services/db:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  api:
    build:
      context: ../../services/api
      dockerfile: Dockerfile
    container_name: nextwave-api
    restart: always
    env_file:
      - ../env/.env.api
    volumes:
      - ../../services/api:/app
    depends_on:
      - db

  web:
    build:
      context: ../../services/web
      dockerfile: Dockerfile
    container_name: nextwave-web
    restart: always
    volumes:
      - ../../services/web:/app
      - /app/node_modules  # 호스트 node_modules와 충돌 방지
    ports:
      - "5173:5173"
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    container_name: nextwave-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ../../services/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
